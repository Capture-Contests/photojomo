<div id="container">
  <div class="entry-page">

    <div class="entry-content">
      <a routerLink="/contest" class="entry-back">&larr; Back to Categories</a>
      <h1 class="entry-heading">{{ contest.title }} <em>Submission Tier &amp; Fees</em></h1>

      <p *ngIf="tiersLoading" class="tier-loading">Loading tiers…</p>
      <p *ngIf="!tiersLoading && tiersError" class="tier-error">Unable to load tiers. Please refresh the page.</p>

      <div *ngIf="!tiersLoading && !tiersError" class="tier-grid">
        <div *ngFor="let tier of tiers" class="tier-card" [class.tier-card--golden]="tier.golden">
          <p class="tier-name"><em>{{ tier.name }}</em></p>
          <p class="tier-price">${{ tier.price }}</p>
          <p class="tier-images">{{ formatImages(tier.maxImages) }}</p>
          <div class="tier-benefits">
            <p class="tier-benefits-label">Benefits</p>
            <p *ngFor="let benefit of tier.benefits" class="tier-benefit-item">&#10003; {{ benefit }}</p>
            <p *ngIf="tier.golden" class="tier-benefit-item golden">&#10003; &#x1F3AB; Golden Ticket</p>
          </div>
          <a [routerLink]="['/checkout', contestId, tier.id]" class="tier-register-btn">Register Now &rarr;</a>
        </div>
      </div>
    </div>
  </div>
</div>
<app-navbar wrapperClass="css-fbgm56 css-8hhw9a css-roiesn" />
